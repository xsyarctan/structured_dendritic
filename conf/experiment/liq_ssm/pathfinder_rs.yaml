# @package _global_

defaults:
  - override /task: classification
  - override /data: pathfinder
  - override /model: ssm_reservoir
  - _self_

run:
  name: liq_ssm_pathfinder_rs

model:
  n_layers: 6
  d_model: 256
  dropout: 0.0
  prenorm: true
  dendrite:
    d_state: 64
    mlp_hidden_multiplier: 0.25

data:
  loader:
    batch_size: 64
    eval_batch_size: 64

optimizer:
  lr: 0.004
  weight_decay: 0.05
  betas: [0.9, 0.999]

scheduler:
  warmup_steps: 50000
  total_steps: 500000
  min_lr_ratio: 0.0

trainer:
  max_epochs: 200
