# @package _global_

defaults:
  - override /task: classification
  - override /data: listops
  - override /model: ssm_reservoir
  - _self_

run:
  name: liq_ssm_listops_rs

model:
  n_layers: 6
  d_model: 256
  dropout: 0.0
  prenorm: false
  dendrite:
    d_state: 4
    mlp_hidden_multiplier: 0.125

data:
  loader:
    batch_size: 32
    eval_batch_size: 32

optimizer:
  lr: 0.01
  weight_decay: 0.05
  betas: [0.9, 0.999]

scheduler:
  warmup_steps: 12000
  total_steps: 120000
  min_lr_ratio: 0.0

trainer:
  max_epochs: 40
