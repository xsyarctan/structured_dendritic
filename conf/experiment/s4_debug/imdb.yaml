# @package _global_

defaults:
  - override /task: classification
  - override /data: imdb
  - override /model: s4d_standard_bidir
  - _self_

run:
  name: s4_debug_imdb

model:
  n_layers: 6
  d_model: 256
  dropout: 0.0
  prenorm: true
  dendrite:
    d_state: 4

data:
  loader:
    batch_size: 16
    eval_batch_size: 16

optimizer:
  lr: 0.01
  weight_decay: 0.05
  betas: [0.9, 0.999]

scheduler:
  warmup_steps: 5000
  total_steps: 50000
  min_lr_ratio: 0.0

trainer:
  max_epochs: 32
