d_model: 256
n_layers: 6
dropout: 0.0
prenorm: true
final_norm: false
max_positions: 8192
tie_embeddings: true
block:
  mode: residual
soma:
  threshold: 0.5
  truncation_steps: 4
dendrite:
  kind: s4d_standard
  direction: bidir
  freeze_dynamics: false
  freeze_processor: false
  d_state: 64
  dt_min: 0.001
  dt_max: 0.1
  input_scale_init: 1.0
  kernel_size: 5
  groups: -1
  bias: true
  n_heads: 4
  optim:
    dynamics_lr: 0.001
    dynamics_weight_decay: 0.0
    processor_lr: null
    processor_weight_decay: null
    skip_lr: null
    skip_weight_decay: null



