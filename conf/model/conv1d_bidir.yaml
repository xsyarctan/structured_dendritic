d_model: 256
n_layers: 8
dropout: 0.1
prenorm: true
max_positions: 8192
tie_embeddings: true
soma:
  threshold: 0.5
  truncation_steps: 4
  optim:
    lr: 0.001
    weight_decay: 0.0
dendrite:
  kind: conv1d
  direction: bidir
  freeze_dynamics: false
  freeze_processor: false
  d_state: 64
  dt_min: 0.001
  dt_max: 0.1
  input_scale_init: 1.0
  kernel_size: 5
  groups: -1
  bias: true
  n_heads: 4
  optim:
    dynamics_lr: null
    dynamics_weight_decay: null
    processor_lr: null
    processor_weight_decay: null
    skip_lr: null
    skip_weight_decay: null


