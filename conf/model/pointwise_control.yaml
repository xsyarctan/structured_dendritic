d_model: 256
n_layers: 8
dropout: 0.1
prenorm: true
final_norm: true
max_positions: 8192
tie_embeddings: true
block:
  mode: spiking
soma:
  threshold: 0.5
  truncation_steps: 4
  optim:
    lr: 0.001
    weight_decay: 0.0
dendrite:
  kind: pointwise_mlp
  direction: causal
  freeze_all: false
  freeze_dynamics: false
  freeze_processor: false
  freeze_skip: false
  d_state: 64
  dt_min: 0.001
  dt_max: 0.1
  input_scale_init: 1.0
  kernel_size: 5
  groups: -1
  bias: true
  n_heads: 4
  use_branch_mixer: true
  branch_mixer_groups: 1
  mixer_bias: true
  mlp_hidden_multiplier: 2.0
  gla_gate_normalizer: 16.0
  optim:
    dynamics_lr: null
    dynamics_weight_decay: null
    processor_lr: null
    processor_weight_decay: null
    skip_lr: null
    skip_weight_decay: null
