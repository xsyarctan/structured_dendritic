task_name: classification
input_kind: pair_text
num_classes: 2
max_length: 4000
train_max_length: null
eval_max_length: null
lm_stride: null
train_lm_stride: null
eval_lm_stride: null
train_fraction: 1.0
eval_fraction: 1.0
max_train_examples: null
max_eval_examples: null
split_seed: 1111
label_field: label
loader:
  batch_size: 16
  eval_batch_size: 32
  num_workers: 4
splits:
  train: train
  validation: validation
  test: test
source:
  path: csv
  data_files:
    train: ${paths.data_root}/aan/new_aan_pairs.train.tsv
    validation: ${paths.data_root}/aan/new_aan_pairs.eval.tsv
    test: ${paths.data_root}/aan/new_aan_pairs.test.tsv
  sep: "`t"
  column_names:
    - label
    - input1_id
    - input2_id
    - text1
    - text2
text:
  primary_field: text1
  secondary_field: text2
image:
  field: image
  channels: 1
tokenizer:
  type: char
  name_or_path: null
  min_frequency: 1
  lowercase: false
  add_bos: false
  add_eos: true
